<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <style>
      .container {
        display: flex;
      }
    </style>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="./index.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="jumbotron">
        <h2>CS498: IoT -- Lab 2</h2>
        <img src="./media/default_background.png" id="pics">
      </div>
    </div>

    <div class="row">
      <div class="container">

        <!-- D-pad -->
        <div class="jumbotron text-center col-md-6">
          <span>&nbsp;&nbsp;</span>
          <span id="upArrow" style="font-size:50px; color:grey;">&#8679;</span>
          <br>
          <span id="leftArrow" style="font-size:45px; color:grey;">&#8678;</span>
          <span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
          <span id="rightArrow" style="font-size:45px; color:grey;">&#8680;</span>
          <br>
          <span>&nbsp;&nbsp;</span>
          <span id="downArrow" style="font-size:50px; color:grey;">&#8681;</span>
        </div>

        <!-- Stats panel -->
        <div class="jumbotron text-left col-md-6">
          <p>
            <span id="direction_dot" style="color:Green">&bull;</span>
            Car Direction: <span id="direction"></span>
            <br>
            <span style="color:green">&bull;</span>
            Speed: <span id="speed">0</span>
            <br>
            <span style="color:green">&bull;</span>
            Distance Travelled (m): <span id="distance">0.0</span>
            <br>
            <span style="color:green">&bull;</span>
            Temperature of the Pi (°C): <span id="temperature">0.0</span>
            <br>
            <span style="color:green">&bull;</span>
            Obstacle Distance (cm): <span id="obstacle">0.0</span>
            <br><br>
            Connection: <span id="status" style="color:grey;">● Connecting…</span>
          </p>
        </div>

      </div>
    </div>
  </body>
</html>
